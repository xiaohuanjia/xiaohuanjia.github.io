<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xiaohuanjia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      color: #333;
      background: #fff;
      line-height: 1.6;
    }
    .container {
      max-width: 750px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }
    nav {
      margin-bottom: 2rem;
    }
    nav a {
      color: #555;
      text-decoration: none;
      margin-right: 1.5rem;
      font-size: 0.95rem;
    }
    nav a:hover { color: #000; }
    .profile {
      display: flex;
      align-items: flex-start;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .profile-photo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .profile-info h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .profile-info .title {
      color: #666;
      font-size: 1rem;
      margin-bottom: 0.8rem;
    }
    .profile-info .links a {
      color: #333;
      text-decoration: none;
      margin-right: 1rem;
    }
    .profile-info .links a:hover {
      text-decoration: underline;
    }
    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.3rem;
    }
    .about p {
      margin-bottom: 1rem;
      color: #444;
    }
    @media (max-width: 600px) {
      .profile {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .profile-info .links {
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="#">Home</a>
    </nav>

    <section class="profile">
      <img src="avatar.png" alt="avatar" class="profile-photo">
      <div class="profile-info">
        <h1>xiaohuanjia</h1>
        <p class="title">Developer</p>
        <div class="links">
          <a href="https://github.com/xiaohuanjia" target="_blank">GitHub</a>
        </div>
      </div>
    </section>

    <section class="about">
      <div class="section-title">About Me</div>
      <p>Hello! Welcome to my personal page.</p>
    </section>
  </div>
</body>
</html>
